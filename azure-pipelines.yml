trigger:
- main

pool:
  name: Default

variables:
  acrName: arjunacr.azurecr.io
  imageName: petclinic
  tag: latest

stages:

# 1️⃣ Fetch
- stage: Fetch
  jobs:
  - job: FetchCode
    steps:
    - checkout: self

# 2️⃣ SonarQube
- stage: SonarQube
  jobs:
  - job: Scan
    steps:
    - script: |
        ./mvnw clean verify sonar:sonar \
        -Dsonar.projectKey=tsarjungowda_petclinic \
        -Dsonar.organization=tsarjungowda \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.login=$(SONAR_TOKEN)

# 3️⃣ Build
- stage: Build
  jobs:
  - job: BuildApp
    steps:
    - script: ./mvnw clean package

# 4️⃣ Docker Build
- stage: DockerBuild
  jobs:
  - job: BuildImage
    steps:
    - script: docker build -t $(acrName)/$(imageName):$(tag) .

# 5️⃣ Push
- stage: Push
  jobs:
  - job: PushImage
    steps:
    - script: |
        docker login arjunacr.azurecr.io -u <username> -p <password>
        docker push $(acrName)/$(imageName):$(tag)

# 6️⃣ Trivy Scan
- stage: Scan
  jobs:
  - job: Security
    steps:
    - script: trivy image $(acrName)/$(imageName):$(tag)

# 7️⃣ Deploy
- stage: Deploy
  jobs:
  - job: DeployApp
    steps:
    - script: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml